version: '3.8'

# This docker-compose file uses LOCAL MongoDB instead of MongoDB Atlas
# Use this if you want to run MongoDB in a container

services:
  # MongoDB Database (Local)
  mongodb:
    image: mongo:7.0
    container_name: it-project-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: test
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
      # Optional: initialize database with seed data
      # - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Flask Backend
  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    container_name: it-project-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      # Flask configuration
      FLASK_APP: app.py
      FLASK_ENV: production
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY:-your-secret-key-change-in-production}
      
      # Use local MongoDB connection
      MONGODB_URI: mongodb://admin:admin123@mongodb:27017/test?authSource=admin
      
      # Python
      PYTHONUNBUFFERED: 1
    volumes:
      # Mount firebase credentials
      - ./flask-server/it-project-auth.json:/app/it-project-auth.json:ro
      # Optional: mount for development
      # - ./flask-server:/app
    networks:
      - app-network
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # React Frontend
  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    container_name: it-project-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      VITE_API_BASE_URL: /api
    networks:
      - app-network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Optional: Mongo Express (Web-based MongoDB admin interface)
  mongo-express:
    image: mongo-express:latest
    container_name: it-project-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: admin123
      ME_CONFIG_MONGODB_URL: mongodb://admin:admin123@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin
    networks:
      - app-network
    depends_on:
      - mongodb

networks:
  app-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
